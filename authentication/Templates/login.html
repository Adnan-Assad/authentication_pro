<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      body {
        background: #f3f4f6;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-box {
        width: 350px;
        background: #ffffff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .login-box h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 24px;
        color: #333;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        font-size: 14px;
        color: #333;
        display: block;
        margin-bottom: 6px;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: 0.2s;
      }

      .form-group input:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 5px rgba(74, 144, 226, 0.4);
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        background: #4a90e2;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        transition: 0.3s;
      }

      .login-btn:hover {
        background: #357abd;
      }

      .extra {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
      }

      .extra a {
        color: #4a90e2;
        text-decoration: none;
      }

      .extra a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>Login</h2>

      <form action="" method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            name="username"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="extra">
          <p>
            Don't have an account? <a href="{% url 'register' %}">Register</a>
          </p>
        </div>
      </form>
    </div>
  </body>
</html>
