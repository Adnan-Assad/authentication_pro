<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>

    <style>
      body {
        background: #f3f4f6;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .form-container {
        background: white;
        padding: 30px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 24px;
        color: #333;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        margin-bottom: 5px;
        color: #333;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: 0.2s;
      }

      .form-group input:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 5px rgba(74, 144, 226, 0.4);
      }

      .submit-btn {
        width: 100%;
        padding: 12px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
      }

      .submit-btn:hover {
        background: #357abd;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Create Account</h2>
      {% if messages %} {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %} {% endif %}

      <form action="" method="POST">
        {% csrf_token %}

        <!-- Full Name -->
        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            name="full_name"
            placeholder="Enter your full name"
            required
          />
        </div>

        <!-- Username -->
        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            name="username"
            placeholder="Choose a username"
            required
          />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <!-- Contact Number -->
        <div class="form-group">
          <label>Contact Number</label>
          <input
            type="text"
            name="contact"
            placeholder="01XXXXXXXXX"
            required
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input
            type="confirm-password"
            name="confirm_password"
            placeholder="Confirm password"
            required
          />
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn">Register</button>
        Don't have an account? <a href="{% url 'login' %}">Login</a>
      </form>
    </div>
  </body>
</html>
